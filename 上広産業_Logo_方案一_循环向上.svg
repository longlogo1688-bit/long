<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .arrow1 { fill: none; stroke: #2E5C58; stroke-width: 10; stroke-linecap: round; }
      .arrow2 { fill: none; stroke: #2E5C58; stroke-width: 10; stroke-linecap: round; }
      .arrow3 { fill: none; stroke: #2E5C58; stroke-width: 10; stroke-linecap: round; }
      .shield { fill: none; stroke: #C9A961; stroke-width: 4; }
      .center-dot { fill: #C9A961; }
    </style>
  </defs>
  
  <!-- 白色背景 -->
  <rect class="bg" width="200" height="200"/>
  
  <!-- 三个向上箭头组成三角形循环 -->
  <!-- 箭头1：左上到右上 -->
  <path class="arrow1" d="M 60,140 L 100,70 L 140,140"/>
  
  <!-- 箭头2：左下到左上 -->
  <path class="arrow2" d="M 140,140 L 70,110 L 60,140"/>
  
  <!-- 箭头3：右下到左下 -->
  <path class="arrow3" d="M 60,140 L 130,110 L 140,140"/>
  
  <!-- 中心安全盾牌轮廓（负空间） -->
  <path class="shield" d="M 100,85 L 115,100 L 115,120 Q 100,135 85,120 L 85,100 Z"/>
  
  <!-- 中心金色点 -->
  <circle class="center-dot" cx="100" cy="110" r="5"/>
  
</svg>